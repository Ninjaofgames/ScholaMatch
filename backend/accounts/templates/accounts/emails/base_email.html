<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}ScholaMatch{% endblock %}</title>
</head>
<body style="margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;background-color:#f8fafc;color:#0f172a;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background-color:#f8fafc;">
    <tr>
      <td align="center" style="padding:40px 20px;">
        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:520px;background-color:#ffffff;border-radius:16px;box-shadow:0 4px 6px -1px rgba(0,0,0,0.05),0 10px 20px -5px rgba(0,0,0,0.08);">
          <tr>
            <td style="padding:32px 40px;">
              <!-- Header -->
              <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="margin-bottom:24px;">
                <tr>
                  <td>
                    <span style="font-size:1.5rem;font-weight:700;color:#0d9488;letter-spacing:-0.02em;">ScholaMatch</span>
                  </td>
                </tr>
              </table>
              <!-- Hero / Title -->
              <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="margin-bottom:24px;">
                <tr>
                  <td align="center" style="padding:16px 0;">
                    <div style="width:64px;height:64px;margin:0 auto 16px;background:linear-gradient(135deg,#14b8a6 0%,#0f766e 100%);border-radius:12px;display:inline-block;"></div>
                    <h1 style="margin:0;font-size:1.75rem;font-weight:700;color:#0f172a;line-height:1.3;">{% block hero_title %}{% endblock %}</h1>
                  </td>
                </tr>
              </table>
              <!-- Message -->
              <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="margin-bottom:24px;">
                <tr>
                  <td style="font-size:1rem;line-height:1.6;color:#475569;">
                    {% block message %}{% endblock %}
                  </td>
                </tr>
              </table>
              <!-- Code block -->
              {% block code_block %}{% endblock %}
              <!-- CTA -->
              {% block cta %}{% endblock %}
              <!-- Footer -->
              <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="margin-top:32px;padding-top:24px;border-top:1px solid #e2e8f0;">
                <tr>
                  <td style="font-size:0.8rem;color:#94a3b8;line-height:1.5;">
                    {% block footer %}{% endblock %}
                  </td>
                </tr>
              </table>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
